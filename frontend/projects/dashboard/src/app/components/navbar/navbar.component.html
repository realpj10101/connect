<section class="container">
    <div class="left">
        <div class="img-container">
            <img src="comment-white.png" alt="" height="25px">
        </div>
        Connect
    </div>
    <div #desktopBtn class="right desktop-actions" (click)="toggleMenu()">A</div>

    <button #menuBtn class="menu-btn" type="button" (click)="toggleMenu()" [class.open]="isMenuOpen" aria-label="Toggle menu"
        [attr.aria-expanded]="isMenuOpen">
        <span></span><span></span><span></span>
    </button>

    <div #menuContainer class="menu" [class.open]="isMenuOpen">
        <div class="profile">
            @if (loggedInUser) {
            <div class="letter">{{loggedInUser.userName[0] | uppercase}}</div>
            <span>{{loggedInUser.userName}}</span>
            }
            @else {
            <div class="letter">User</div>
            }
        </div>
        <div class="top">
            <button class="nav-btn" routerLink="/dashboard" routerLinkActive="active">
                <div class="icon">
                    <!-- LayoutGrid -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                </div> Rooms
            </button>
            <button class="nav-btn" routerLink="/profile" routerLinkActive="active">
                <div class="icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M7 21v-2a4 4 0 0 1 3-3.87" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                Profile
            </button>
            <button class="nav-btn" routerLink="/create-room" routerLinkActive="active">
                <div class="icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                </div>
                New Room
            </button>
            <div class="divider"></div>
            <button class="sign-out" (click)="accountService.logout()">
                <div class="icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </div>
                Sign out
            </button>
        </div>
    </div>
</section>
